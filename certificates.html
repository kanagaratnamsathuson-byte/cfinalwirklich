<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  :root {
    --black: #000000;
    --white: #ffffff;
    --accent: #60a5fa;
    --accent-dark: #3b82f6;
    --bg: #0a0a0a;
    --line: #1a1a1a;
    --panel: #1a1a1a;
    --muted: #6b6b6b;
    --success: #10b981;
    --text-secondary: #9ca3af;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--white);
    padding: 2rem 2.5rem;
    min-height: 100vh;
  }

  .page {
    max-width: 1200px;
    margin: 0 auto;
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .header-back {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
    transition: all 0.2s;
    cursor: pointer;
  }

  .header-back:hover {
    gap: 0.75rem;
    color: var(--accent-dark);
  }

  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    margin-bottom: 0.5rem;
    color: var(--white);
  }

  .header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    letter-spacing: 0.05em;
  }

  .header-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }

  .stat-card {
    background: var(--panel);
    border: 0.5px solid var(--line);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
  }

  .stat-number {
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--accent);
    display: block;
  }

  .stat-label {
    font-size: 0.75rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.25rem;
  }

  /* Filter & Controls */
  .controls {
    display: flex;
    gap: 1rem;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--panel);
    border: 0.5px solid var(--line);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    color: var(--white);
    font-size: 0.9rem;
    transition: all 0.2s;
  }

  .search-box:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(96, 165, 250, 0.2);
  }

  .filter-btn {
    background: var(--panel);
    border: 0.5px solid var(--line);
    color: var(--white);
    padding: 0.7rem 1rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--black);
  }

  /* Certificate Grid */
  .certificates-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .cert-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.23, 1, 0.320, 1);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    animation: fadeUp 0.6s ease both;
  }

  .cert-card:nth-child(1) { animation-delay: 0.1s; }
  .cert-card:nth-child(2) { animation-delay: 0.2s; }
  .cert-card:nth-child(3) { animation-delay: 0.3s; }
  .cert-card:nth-child(4) { animation-delay: 0.4s; }
  .cert-card:nth-child(5) { animation-delay: 0.5s; }
  .cert-card:nth-child(6) { animation-delay: 0.6s; }
  .cert-card:nth-child(7) { animation-delay: 0.7s; }

  .cert-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(96, 165, 250, 0.25);
    border-color: var(--accent);
  }

  .cert-header {
    background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, rgba(96, 165, 250, 0.05) 100%);
    padding: 1.5rem;
    border-bottom: 1px solid var(--line);
  }

  .cert-number {
    font-size: 0.7rem;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .cert-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .cert-date {
    font-size: 0.8rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .cert-body {
    padding: 1.5rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .cert-description {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text-secondary);
    margin-bottom: 1rem;
  }

  .cert-skills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .skill-tag {
    background: rgba(96, 165, 250, 0.1);
    border: 0.5px solid var(--accent);
    color: var(--accent);
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .cert-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    background: var(--black);
    border-top: 0.5px solid var(--line);
    margin-top: auto;
  }

  .cert-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--success);
    font-weight: 600;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);
  }

  .cert-action {
    background: var(--accent);
    color: var(--black);
    border: none;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cert-action:hover {
    background: var(--accent-dark);
    transform: scale(1.05);
  }

  /* Modal / Details View */
  .modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.3s ease;
  }

  .modal.active {
    display: flex;
  }

  .modal-content {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    max-width: 800px;
    width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }

  .modal-header {
    padding: 2rem;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 1.5rem;
    cursor: pointer;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close:hover {
    color: var(--accent-dark);
    transform: scale(1.1);
  }

  .modal-body {
    padding: 2rem;
  }

  .modal-section {
    margin-bottom: 2rem;
  }

  .modal-section h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  .modal-section p {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text-secondary);
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--text-secondary);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  /* Animations */
  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 768px) {
    body {
      padding: 1.5rem;
    }

    .header h1 {
      font-size: 1.8rem;
    }

    .certificates-grid {
      grid-template-columns: 1fr;
    }

    .controls {
      flex-direction: column;
    }

    .search-box {
      min-width: 100%;
    }

    .header-stats {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <a href="index.html" class="header-back">← Zurück zur Startseite</a>
    <h1>ÜK Zertifikate</h1>
    <p>Überbetriebliche Kurse · Berufsausbildung</p>
  </div>

  <!-- Stats -->
  <div class="header-stats">
    <div class="stat-card">
      <span class="stat-number">7</span>
      <span class="stat-label">Zertifikate</span>
    </div>
    <div class="stat-card">
      <span class="stat-number">2025</span>
      <span class="stat-label">Jahrgang</span>
    </div>
    <div class="stat-card">
      <span class="stat-number">100%</span>
      <span class="stat-label">Bestanden</span>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="controls">
    <input 
      type="text" 
      id="searchInput" 
      class="search-box" 
      placeholder="Nach Zertifikat suchen..."
    >
    <button class="filter-btn active" data-filter="all">Alle</button>
    <button class="filter-btn" data-filter="2025">2025</button>
  </div>

  <!-- Certificates Grid -->
  <div class="certificates-grid" id="certificatesGrid">
    <!-- Cards werden via JavaScript eingefügt -->
  </div>

</div>

<!-- Modal / Details -->
<div class="modal" id="detailsModal">
  <div class="modal-content">
    <div class="modal-header">
      <div>
        <div class="cert-number" id="modalNumber"></div>
        <h2 style="font-size: 1.5rem; margin-top: 0.5rem;" id="modalTitle"></h2>
      </div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-section" id="pdfSection" style="display: none;">
        <h3>📄 Zertifikat</h3>
        <div style="background: var(--black); border-radius: 8px; overflow: hidden; margin-top: 1rem; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;">
          <iframe 
            id="pdfViewer" 
            style="width: 100%; height: 100%; border: none;"
            allowfullscreen
          ></iframe>
        </div>
        <div style="margin-top: 1rem; text-align: center;">
          <a id="pdfDownload" href="#" target="_blank" style="display: inline-block; background: var(--accent); color: var(--black); padding: 0.6rem 1.2rem; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: all 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">⬇ PDF herunterladen</a>
        </div>
      </div>
      <div class="modal-section" id="noPdfSection">
        <h3>📄 Zertifikat</h3>
        <p style="color: var(--text-secondary); font-style: italic;">Zertifikat-PDF wird noch hochgeladen</p>
      </div>
      <div class="modal-section">
        <h3>Details</h3>
        <p id="modalDescription"></p>
      </div>
      <div class="modal-section">
        <h3>Lernziele</h3>
        <p id="modalLearningGoals"></p>
      </div>
      <div class="modal-section">
        <h3>Kompetenzen</h3>
        <div class="cert-skills" id="modalSkills"></div>
      </div>
      <div class="modal-section">
        <h3>Status</h3>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
          <div class="status-dot"></div>
          <span style="color: var(--success); font-weight: 600;">Bestanden</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const certificates = [
    {
      id: 1,
      number: 'ÜK-190',
      title: 'Virtualisierungsplattform aufbauen und betreiben',
      date: '2025',
      year: 2025,
      description: 'Aufbau und Verwaltung von Virtualisierungsplattformen. Praktische Anwendung von Hypervisoren und virtuellen Maschinen.',
      learningGoals: 'Virtualisierungsplattformen wie VMware oder Hyper-V einrichten, konfigurieren und optimieren. Virtualisierungstechnologien verstehen und anwenden.',
      skills: ['Virtualisierung', 'VMware', 'Hyper-V', 'KVM', 'System Administration'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 2,
      number: 'ÜK-187',
      title: 'ICT-Arbeitsplatz mit Betriebssystem in Betrieb nehmen',
      date: '2025',
      year: 2025,
      description: 'Setup und Konfiguration von modernen ICT-Arbeitsplätzen mit verschiedenen Betriebssystemen.',
      learningGoals: 'Arbeitsplätze mit Windows, Linux und anderen OS konfigurieren. Hard- und Softwarekompatibilität gewährleisten.',
      skills: ['Windows', 'Linux', 'macOS', 'Hardware Setup', 'System Configuration'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 3,
      number: 'ÜK-106',
      title: 'Datenbanken abfragen, bearbeiten und warten',
      date: '2025',
      year: 2025,
      description: 'Praktische Datenbankverwaltung mit SQL. Abfragen optimieren, Daten verwalten und Datenbanken warten.',
      learningGoals: 'SQL-Abfragen schreiben und optimieren. Datenbankstrukturen verstehen und pflegen. Backups und Recovery durchführen.',
      skills: ['SQL', 'MySQL', 'PostgreSQL', 'Datenmodellierung', 'Maintenance'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 4,
      number: 'ÜK-216',
      title: 'Internet of Everything - Endgeräte in bestehende Plattform integrieren',
      date: '2025',
      year: 2025,
      description: 'Integration von IoT-Geräten in bestehende Netzwerk- und Cloud-Plattformen.',
      learningGoals: 'IoT-Geräte konfigurieren und in Plattformen integrieren. Netzwerk- und Sicherheitsaspekte beachten. IoE-Konzepte verstehen.',
      skills: ['IoT', 'Cloud Integration', 'Netzwerk', 'Sensorik', 'Edge Computing'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 5,
      number: 'ÜK-109',
      title: 'Dienste in der Public Cloud betreiben und überwachen',
      date: '2025',
      year: 2025,
      description: 'Betrieb und Überwachung von Diensten in öffentlichen Cloud-Umgebungen wie AWS, Azure oder Google Cloud.',
      learningGoals: 'Cloud-Dienste einrichten und konfigurieren. Monitoring und Alerting implementieren. Cloud-native Konzepte verstehen.',
      skills: ['AWS', 'Azure', 'Google Cloud', 'Monitoring', 'Cloud Services', 'DevOps'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 6,
      number: 'ÜK-184',
      title: 'Netzwerksicherheit implementieren',
      date: '2025',
      year: 2025,
      description: 'Implementierung von Sicherheitsmaßnahmen in Netzwerken. Firewalls, VPNs und Zugriffskontrolle konfigurieren.',
      learningGoals: 'Netzwerksicherheit planen und umsetzen. Firewalls und VPNs konfigurieren. Sicherheitsrichtlinien implementieren.',
      skills: ['Firewall', 'VPN', 'Zugriffskontrolle', 'Verschlüsselung', 'Network Security', 'Intrusion Detection'],
      pdfUrl: '' // PDF URL einfügen
    },
    {
      id: 7,
      number: 'ÜK-188',
      title: 'Services warten, überwachen und betreiben',
      date: '2025',
      year: 2025,
      description: 'Wartung, Überwachung und Betrieb von IT-Dienste und Systemen im produktiven Umfeld.',
      learningGoals: 'Services überwachen und instand halten. Ticketing und Incident Management durchführen. Logs analysieren und optimieren.',
      skills: ['Service Management', 'Monitoring', 'Maintenance', 'Incident Management', 'Log Analysis', 'Ticketing'],
      pdfUrl: '' // PDF URL einfügen
    }
  ];

  let filteredCerts = [...certificates];

  function renderCertificates() {
    const grid = document.getElementById('certificatesGrid');
    
    if (filteredCerts.length === 0) {
      grid.innerHTML = `
        <div style="grid-column: 1 / -1;">
          <div class="empty-state">
            <div class="empty-icon">🔍</div>
            <h3 style="margin-bottom: 0.5rem;">Keine Zertifikate gefunden</h3>
            <p>Versuche eine andere Suche oder Filter</p>
          </div>
        </div>
      `;
      return;
    }

    grid.innerHTML = filteredCerts.map(cert => `
      <div class="cert-card" onclick="openModal(${cert.id})">
        <div class="cert-header">
          <div class="cert-number">${cert.number}</div>
          <div class="cert-title">${cert.title}</div>
          <div class="cert-date">
            <span>📅</span>
            <span>${cert.date}</span>
          </div>
        </div>
        <div class="cert-body">
          <p class="cert-description">${cert.description}</p>
          <div class="cert-skills">
            ${cert.skills.slice(0, 3).map(skill => `<span class="skill-tag">${skill}</span>`).join('')}
          </div>
        </div>
        <div class="cert-footer">
          <div class="cert-status">
            <span class="status-dot"></span>
            Bestanden
          </div>
          <button class="cert-action">Details →</button>
        </div>
      </div>
    `).join('');
  }

  function openModal(certId) {
    const cert = certificates.find(c => c.id === certId);
    if (!cert) return;

    document.getElementById('modalNumber').textContent = cert.number;
    document.getElementById('modalTitle').textContent = cert.title;
    document.getElementById('modalDescription').textContent = cert.description;
    document.getElementById('modalLearningGoals').textContent = cert.learningGoals;
    document.getElementById('modalSkills').innerHTML = cert.skills
      .map(skill => `<span class="skill-tag">${skill}</span>`)
      .join('');

    // PDF Handling
    if (cert.pdfUrl && cert.pdfUrl.trim() !== '') {
      document.getElementById('pdfSection').style.display = 'block';
      document.getElementById('noPdfSection').style.display = 'none';
      document.getElementById('pdfViewer').src = cert.pdfUrl;
      document.getElementById('pdfDownload').href = cert.pdfUrl;
    } else {
      document.getElementById('pdfSection').style.display = 'none';
      document.getElementById('noPdfSection').style.display = 'block';
    }

    document.getElementById('detailsModal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('detailsModal').classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  function applyFilters() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;

    filteredCerts = certificates.filter(cert => {
      const matchesSearch = 
        cert.title.toLowerCase().includes(searchTerm) ||
        cert.number.toLowerCase().includes(searchTerm);
      
      const matchesFilter = activeFilter === 'all' || cert.year.toString() === activeFilter;

      return matchesSearch && matchesFilter;
    });

    renderCertificates();
  }

  // Event Listeners
  document.getElementById('searchInput').addEventListener('input', applyFilters);

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      applyFilters();
    });
  });

  document.getElementById('detailsModal').addEventListener('click', (e) => {
    if (e.target.id === 'detailsModal') {
      closeModal();
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
    }
  });

  // Initial render
  renderCertificates();
</script>

</body>
</html>
